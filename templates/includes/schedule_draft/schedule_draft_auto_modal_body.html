<div class="schedule-draft-auto-preview" data-draft-auto-preview-content aria-live="polite">
    <div class="schedule-draft-auto-confirm">
        <div class="schedule-draft-auto-confirm__icon">
            <span class="material-icons-sharp" aria-hidden="true">auto_fix_high</span>
        </div>
        <div>
            <strong>Запустить фоновый добор</strong>
            <p>Система подберёт лучшие варианты в фоне, проверит правила состава и обновит черновик. Прогресс будет виден на странице.</p>
        </div>
    </div>
</div>

<form method="post" action="{{ draft_auto_place_url }}" class="schedule-draft-auto-confirm-form">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ current_path }}">
    <div class="app-modal__actions">
        <button type="button" class="app-modal__button app-modal__button--secondary" data-modal-close>Отмена</button>
        <button type="submit" class="app-modal__button app-modal__button--primary" data-draft-auto-submit>
            Запустить добор
        </button>
    </div>
</form>
